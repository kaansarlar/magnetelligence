<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEA Alloy Calculator — Magnetelligence Lab</title>
<style>
:root{--bg:#f7f7f5;--card:#ffffff;--ink:#1a1a1a;--muted:#666;--line:#e0e0dc;--acc:#1d5fa0;--neg:#1d5fa0;--pos:#a83232;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",system-ui,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;padding:16px;}
.wrap{max-width:760px;margin:0 auto;}
header{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
h1{font-size:1.25rem;font-weight:600;}
.lang button{border:1px solid var(--line);background:var(--card);padding:4px 12px;cursor:pointer;font-size:.85rem;border-radius:6px 0 0 6px;}
.lang button:last-child{border-radius:0 6px 6px 0;border-left:none;}
.lang button.on{background:var(--acc);color:#fff;border-color:var(--acc);}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px;margin-bottom:14px;}
label{display:block;font-size:.85rem;color:var(--muted);margin:10px 0 4px;}
input[type=text]{width:100%;padding:9px 11px;font-size:1rem;border:1px solid var(--line);border-radius:7px;font-family:Consolas,monospace;}
input[type=text]:focus{outline:2px solid var(--acc);border-color:var(--acc);}
input[type=text]::placeholder{color:#b8b8b2;font-style:italic;}
.row{display:flex;gap:12px;flex-wrap:wrap;}
.row>div{flex:1;min-width:200px;}
button.go{margin-top:14px;background:var(--acc);color:#fff;border:none;padding:10px 26px;font-size:1rem;border-radius:7px;cursor:pointer;}
button.go:hover{opacity:.9;}
.err{color:var(--pos);font-size:.9rem;margin-top:10px;display:none;}
#results{display:none;}
table.res{width:100%;border-collapse:collapse;margin:8px 0;}
table.res td{padding:7px 4px;border-bottom:1px solid var(--line);font-size:.95rem;}
table.res td:last-child{text-align:right;font-family:Consolas,monospace;font-weight:600;}
.pairs{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.pair{font-family:Consolas,monospace;font-size:.82rem;padding:3px 9px;border-radius:5px;background:#eef3fa;color:var(--neg);}
.pair.p{background:#faeeee;color:var(--pos);}
.pair.z{background:#f0f0ee;color:#555;}
.src{font-size:.78rem;color:var(--muted);margin-top:12px;}
.frac{font-family:Consolas,monospace;font-size:.85rem;color:var(--muted);margin-bottom:4px;}
h2{font-size:1rem;font-weight:600;margin-bottom:6px;}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1 id="t_title"></h1>
  <div class="lang">
    <button id="btn_tr" onclick="setLang('tr')">Türkçe</button>
    <button id="btn_en" onclick="setLang('en')">English</button>
  </div>
</header>

<div class="card">
  <label id="t_formula" for="formula"></label>
  <input type="text" id="formula" placeholder="Fe29Mn33Al15Ni14Cu9" autocomplete="off">
  <label id="t_override" for="override"></label>
  <input type="text" id="override" placeholder="Fe-O=-15; Ni-O=-20" autocomplete="off">
  <button class="go" id="t_calc" onclick="calc()"></button>
  <div class="err" id="errbox"></div>
</div>

<div class="card" id="results">
  <h2 id="res_name"></h2>
  <div class="frac" id="res_basis"></div>
  <div class="frac" id="res_nominal"></div>
  <div class="frac" id="res_frac"></div>
  <table class="res">
    <tr><td id="t_delta"></td><td id="v_delta"></td></tr>
    <tr><td id="t_dchi"></td><td id="v_dchi"></td></tr>
    <tr><td id="t_vec"></td><td id="v_vec"></td></tr>
    <tr><td id="t_dh"></td><td id="v_dh"></td></tr>
    <tr><td id="t_ds"></td><td id="v_ds"></td></tr>
  </table>
  <h2 id="t_pairs" style="margin-top:14px"></h2>
  <div class="pairs" id="pairbox"></div>
  <div class="src" id="t_src"></div>
</div>
</div>

function setLang(l){
  lang = l;
  document.documentElement.lang = l;
  document.getElementById("btn_tr").className = l==="tr"?"on":"";
  document.getElementById("btn_en").className = l==="en"?"on":"";
  const t = L[l];
  for (const id of ["title","formula","override","calc","delta","dchi","vec","dh","ds","pairs","src"])
    document.getElementById("t_"+id).textContent = t[id];
  document.title = t.title + " — Magnetelligence Lab";
  if (lastRes) render(lastRes);
}

function parseFormula(s){
  s = s.replace(/,/g," ").trim();
  const comp = {};
  const re = /([A-Z][a-z]?)\s*([0-9]*\.?[0-9]*)/g;
  let m2, found=false;
  while ((m2 = re.exec(s)) !== null){
    if (!m2[1]) continue;
    found = true;
    const v = m2[2] ? parseFloat(m2[2]) : 1.0;
    comp[m2[1]] = (comp[m2[1]]||0) + v;
    if (m2.index === re.lastIndex) re.lastIndex++;
  }
  return found ? comp : null;
}

function parseOverrides(s){
  const out = {};
  if (!s.trim()) return out;
  for (const chunk of s.split(/[;\n]+/)){
    const c = chunk.trim();
    if (!c) continue;
    const m2 = c.match(/^([A-Z][a-z]?)\s*-\s*([A-Z][a-z]?)\s*=\s*(-?[0-9]*\.?[0-9]+)$/);
    if (!m2) throw L[lang].e_override + "'" + c + "'";
    out[[m2[1],m2[2]].sort().join("-")] = parseFloat(m2[3]);
  }
  return out;
}

function getDH(a,b,ov){
  const k = [a,b].sort().join("-");
  if (k in ov) return ov[k];
  if (k in DHMIX) return DHMIX[k];
  return null;
}

    if (unknown.length) throw t.e_unknown + unknown.join(", ");
    const positive = {};
    for (const e in comp) if (comp[e] > 0) positive[e] = comp[e];
    let total = 0;
    for (const e in positive) total += positive[e];
    if (total <= 0) throw t.e_parse;
    // Nominal atomik kesirler (her zaman raporlanir)
    const nom = {};
    for (const e in positive) nom[e] = positive[e]/total;
    // Otomatik taban secimi (HEA_TcRuler.choose_descriptor_composition genisletilmis hali):
    // - tum katsayilar esit (esatomlu, orn. CoCrFeMnNi, Al5Fe5Cu5) -> dogrudan atomik
    // - toplam ~1 (kesir) -> dogrudan atomik
    // - toplam >= 20 (yuzde tarzi alt indisler; at.% 100'e tamamlanmasa da, orn. Er20Gd20Dy20Co20Al2) -> dogrudan atomik
    // - aksi halde (kucuk katsayili stokiyometrik formul, orn. Mn0.6Ni0.55Si0.62..., Gd5Si2Ge2)
    //   nominal katsayilar atom kutlesiyle normalize edilir (makale-uyumlu, wt.%).
    const vals = Object.values(positive);
    const allEqual = vals.every(v => Math.abs(v - vals[0]) < 1e-9);
    const direct = allEqual || Math.abs(total-1) <= 0.01 || total >= 20;
    let c;
    if (direct){
      c = nom;
    } else {
      const noMass = Object.keys(positive).filter(e => !(e in MASS));
      if (noMass.length) throw t.e_mass + noMass.join(", ");
      const w = {}; let tw = 0;
      for (const e in positive){ w[e] = positive[e]*MASS[e]; tw += w[e]; }
      c = {};
      for (const e in w) c[e] = w[e]/tw;
    }
    const els = Object.keys(c);

    const missing = [];
    for (let i=0;i<els.length;i++) for (let j=i+1;j<els.length;j++)
      if (getDH(els[i],els[j],ov) === null) missing.push(els[i]+"-"+els[j]);
    if (missing.length) throw t.e_missing + missing.join(", ") + t.e_missing2;

    let chiAvg=0, vec=0, rAvg=0;
    for (const e of els){ chiAvg += c[e]*PROPS[e][1]; vec += c[e]*PROPS[e][2]; rAvg += c[e]*PROPS[e][0]; }
    let dchi=0, delta=0;
    for (const e of els){ dchi += c[e]*Math.pow(PROPS[e][1]-chiAvg,2); delta += c[e]*Math.pow(1-PROPS[e][0]/rAvg,2); }
    dchi = Math.sqrt(dchi); delta = 100*Math.sqrt(delta);
    let dh=0;
    const pairs=[];
    for (let i=0;i<els.length;i++) for (let j=i+1;j<els.length;j++){
      const v = getDH(els[i],els[j],ov);
      dh += 4*v*c[els[i]]*c[els[j]];
      pairs.push([els[i],els[j],v]);
    }
    let ds=0;
    for (const e of els) ds += c[e]*Math.log(c[e]);
    ds = -R*ds;

    lastRes = {c, nom, basis: direct ? "direct" : "paper", delta, dchi, vec, dh, ds, pairs,
               name: document.getElementById("formula").value.trim()};
    render(lastRes);
  }catch(err){
    errbox.textContent = typeof err === "string" ? err : String(err);
    errbox.style.display = "block";
  }
}

function render(r){
  const t = L[lang];
  document.getElementById("res_name").textContent = r.name;
  const fmt = o => Object.keys(o).sort().map(e => e+" "+o[e].toFixed(4)).join("  ");
  document.getElementById("res_basis").textContent = r.basis==="direct" ? t.basis_direct : t.basis_paper;
  document.getElementById("res_nominal").textContent = t.nomfrac + fmt(r.nom);
  document.getElementById("res_frac").textContent = t.frac + fmt(r.c);
  document.getElementById("v_delta").textContent = r.delta.toFixed(4);
  document.getElementById("v_dchi").textContent = r.dchi.toFixed(4);
  document.getElementById("v_vec").textContent = r.vec.toFixed(4);
  document.getElementById("v_dh").textContent = r.dh.toFixed(4);
  document.getElementById("v_ds").textContent = r.ds.toFixed(4) + "  (" + (r.ds/R).toFixed(3) + " R)";
  const pb = document.getElementById("pairbox");
  pb.innerHTML = "";
  for (const [a,b,v] of r.pairs){
    const sp = document.createElement("span");
    sp.className = "pair" + (v>0?" p":(Math.abs(v)<=2?" z":""));
    sp.textContent = a+"–"+b+": "+v;
    pb.appendChild(sp);
  }
  document.getElementById("results").style.display = "block";
}

document.getElementById("formula").addEventListener("keydown", e => { if (e.key==="Enter") calc(); });
document.getElementById("override").addEventListener("keydown", e => { if (e.key==="Enter") calc(); });
setLang("tr");
</script>
